<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Подбор ЖК по бюджету</title>

  <script>
    (function () {
      try {
        var saved = localStorage.getItem("jk-theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
        } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="assets/styles.css" />
  <script defer src="js/theme.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body>

<button
  type="button"
  class="theme-toggle"
  id="themeToggle"
  aria-label="Переключить на тёмную тему"
  title="Переключить тему"
>
  <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
</button>

<div class="container">

  <h1>Подбор новостроек по бюджету</h1>

  <!-- Блок ввода бюджета -->
  <div class="search-block">

    <label>
      Введите бюджет клиента (в тенге)
    </label>

    <input
      type="number"
      id="budgetInput"
      placeholder="Например: 35000000"
    >

    <button onclick="findApartments()">
      Подобрать ЖК
    </button>

  </div>

  <!-- Сюда выводятся результаты -->
  <div class="results" id="results"></div>

</div>

</body>
</html>
